        }

            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .section:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;

        }

        .form-group {

        }

        .form-group label {

            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 1.1em;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-container input[type="range"] {
            flex: 1;
        }

        .slider-value {
            min-width: 50px;
            padding: 8px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            border-radius: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }

            background: #f0f0f0;
            border-radius: 15px;
            font-size: 0.9em;
            color: #666;
            margin-left: 10px;
        }

        .calculate-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .calculate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }

        .calculate-btn:active {
            transform: translateY(0);
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .risk-value {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .risk-level {
            display: inline-block;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 15px;
        }

        .risk-level.level1 {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
        }

        .risk-level.level2 {
            background: linear-gradient(135deg, #ffa502 0%, #ffbe76 100%);
            color: white;
        }

        .risk-level.level3 {
            background: linear-gradient(135deg, #3742fa 0%, #5352ed 100%);
            color: white;
        }

        .risk-level.level4 {
            background: linear-gradient(135deg, #2ed573 0%, #7bed9f 100%);
            color: white;
        }

        .risk-level.level5 {
            background: linear-gradient(135deg, #1e90ff 0%, #70a1ff 100%);
            color: white;
        }

        .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            font-size: 1.3em;

            color: #555;
            font-size: 1em;
        }

        .result-card ul {
            padding-left: 20px;

        .result-card li {
            margin-bottom: 8px;
        }

        .params-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .param-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .param-item:last-child {
            border-bottom: none;
        }

        .param-label {
            font-weight: bold;
            color: #666;
        }

        .param-value {
            color: #667eea;
            font-weight: bold;
        }

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;

            padding: 20px;
            color: #999;

                        电子围栏

                    </label>
                    <div class="slider-container">
                        <input type="range" id="fenceScore" min="0" max="10" value="5" step="1">
                        <span class="slider-value" id="fenceValue">5</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        保安巡逻

                    </label>

                    </div>
                </div>

                <div class="form-group">
                    <label>
                        监控

                    </label>
                    <div class="slider-container">

                    </div>

                    </div>
                </div>

                    </div>

                    </div>

                        <h3>📊 计算参数详情</h3>
                        <div class="params-display" id="calcDetails"></div>
                    </div>
                </div>
            </div>
        </div>

        function updateSubRiskTypes() {
            const mainRisk = document.getElementById('mainRiskType').value;

        function updateDefaultValues() {
            const subRisk = document.getElementById('subRiskType').value;
            if (subRisk && riskDefaults[subRisk]) {
                const defaults = riskDefaults[subRisk];
                document.getElementById('LValue').textContent = defaults.L;
                document.getElementById('EValue').textContent = defaults.E;
                document.getElementById('CValue').textContent = defaults.C;
            }
        }

        function setupSliders() {
            const sliders = [
                {id: 'fenceScore', valueId: 'fenceValue'},
                {id: 'securityScore', valueId: 'securityValue'},
                {id: 'cameraScore', valueId: 'cameraValue'},
                {id: 'accessScore', valueId: 'accessValue'}
            ];

            sliders.forEach(slider => {
                const sliderEl = document.getElementById(slider.id);
                const valueEl = document.getElementById(slider.valueId);

                sliderEl.addEventListener('input', function() {
                    valueEl.textContent = this.value;
                });
            });
        }

        function calculateRisk() {
            const mainRiskType = document.getElementById('mainRiskType').value;
            const subRiskType = document.getElementById('subRiskType').value;
            const timePeriod = document.getElementById('timePeriod').value;
            const weather = document.getElementById('weather').value;

            const L = parseFloat(document.getElementById('LValue').textContent);
            const E = parseFloat(document.getElementById('EValue').textContent);
            const C = parseFloat(document.getElementById('CValue').textContent);

            const fenceScore = parseFloat(document.getElementById('fenceScore').value);
            const securityScore = parseFloat(document.getElementById('securityScore').value);
            const cameraScore = parseFloat(document.getElementById('cameraScore').value);
            const accessScore = parseFloat(document.getElementById('accessScore').value);

            let Kt = 1.0;
            if (timePeriod === '早高峰') Kt = 1.8;
            else if (timePeriod === '晚高峰') Kt = 1.5;

            let Kw = 1.0;
            if (weather === '暴雨') Kw = 1.5;
            else if (weather === '阴天') Kw = 1.3;

            const K = Kt * Kw;

            const weights = {
                '电子围栏': 0.30,
                '保安巡逻': 0.20,
                '监控': 0.25,
                '门禁': 0.25
            };

            const sum_WiSi = weights['电子围栏'] * fenceScore +
                           weights['保安巡逻'] * securityScore +
                           weights['监控'] * cameraScore +
                           weights['门禁'] * accessScore;

            const V = 1 / (1 + sum_WiSi);

            const D = L * E * C * K * V;

            let riskLevel = '五级 (稍有危险)';
            let levelClass = 'level5';
            if (D >= 320) {
                riskLevel = '一级 (极其危险)';
                levelClass = 'level1';
            } else if (D >= 160) {
                riskLevel = '二级 (高度危险)';
                levelClass = 'level2';
            } else if (D >= 70) {
                riskLevel = '三级 (显著危险)';
                levelClass = 'level3';
            } else if (D >= 20) {
                riskLevel = '四级 (一般危险)';
                levelClass = 'level4';
            }

            document.getElementById('riskValue').textContent = D.toFixed(4);
            const riskLevelEl = document.getElementById('riskLevel');
            riskLevelEl.textContent = riskLevel;
            riskLevelEl.className = 'risk-level ' + levelClass;

            const suggestionsList = document.getElementById('suggestions');
            suggestionsList.innerHTML = '';
            if (suggestions[subRiskType]) {
                suggestions[subRiskType].forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    suggestionsList.appendChild(li);
                });
            } else {
                const li = document.createElement('li');
                li.textContent = '针对该风险类型，请参照相关风险等级的整体建议执行。';
                suggestionsList.appendChild(li);
            }

            const measuresList = document.getElementById('measures');
            measuresList.innerHTML = '';
            const levelMeasures = measures[riskLevel] || measures['五级 (稍有危险)'];
            levelMeasures.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                measuresList.appendChild(li);
            });

            const calcDetails = document.getElementById('calcDetails');
            calcDetails.innerHTML = `
                <div class="param-item">
                    <span class="param-label">事故发生的可能性 (L)</span>
                    <span class="param-value">${L}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">人员暴露于危险环境的频率 (E)</span>
                    <span class="param-value">${E}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">事故后果的严重程度 (C)</span>
                    <span class="param-value">${C}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">时间修正系数 (Kt)</span>
                    <span class="param-value">${Kt}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">天气修正系数 (Kw)</span>
                    <span class="param-value">${Kw}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">时空修正系数 (K=Kt×Kw)</span>
                    <span class="param-value">${K.toFixed(4)}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">防护措施效能因子 (V)</span>
                    <span class="param-value">${V.toFixed(6)}</span>
                </div>
                <div class="param-item">
                    <span class="param-label">风险值 (D=L×E×C×K×V)</span>
                    <span class="param-value">${D.toFixed(4)}</span>
                </div>
            `;

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultSection').scrollIntoView({behavior: 'smooth'});
        }

        document.getElementById('mainRiskType').addEventListener('change', updateSubRiskTypes);
        document.getElementById('subRiskType').addEventListener('change', updateDefaultValues);

        updateSubRiskTypes();
        setupSliders();
